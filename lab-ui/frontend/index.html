<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabOS — Research Lab</title>
  <link rel="stylesheet" href="css/lab.css" />
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
  <!-- ── HUD ─────────────────────────────────── -->
  <div id="hud">
    <div id="hud-left">
      <span id="hud-level">Level 1</span>
      <div id="xp-bar-wrap">
        <div id="xp-bar"></div>
      </div>
      <span id="hud-xp">0 XP</span>
    </div>
    <div id="hud-center">
      <span id="hud-title">LabOS</span>
    </div>
    <div id="hud-right">
      <span id="hud-time">--:--</span>
      <span id="hud-date">--- -- --</span>
    </div>
  </div>

  <!-- ── Lab scene ────────────────────────────── -->
  <div id="lab-scene">

    <!-- Zones (background tiles) -->
    <div class="zone" id="zone-bookshelf"   style="left:4%;top:10%;width:18%;height:28%"></div>
    <div class="zone" id="zone-bench"       style="left:26%;top:8%;width:22%;height:30%"></div>
    <div class="zone" id="zone-news-board"  style="left:52%;top:8%;width:20%;height:28%"></div>
    <div class="zone" id="zone-desk"        style="left:75%;top:10%;width:20%;height:26%"></div>
    <div class="zone" id="zone-advisor"     style="left:4%;top:52%;width:24%;height:32%"></div>
    <div class="zone" id="zone-review"      style="left:33%;top:50%;width:22%;height:30%"></div>
    <div class="zone" id="zone-security"    style="left:60%;top:52%;width:16%;height:28%"></div>
    <div class="zone" id="zone-pi-desk"     style="left:79%;top:50%;width:18%;height:30%"></div>

    <!-- Zone labels -->

    <!-- Agent sprites (clickable) -->
    <!-- Each agent is a div with emoji + name + status bubble -->
  </div>

  <!-- ── Dialogue box (Stardew style) ─────────── -->
  <div id="dialogue-overlay" class="hidden">
    <div id="dialogue-box">
      <div id="dialogue-text-wrap">
        <div id="dialogue-text"></div>
        <div id="dialogue-cursor">▼</div>
      </div>
      <div id="dialogue-portrait-wrap">
        <div id="dialogue-avatar"></div>
        <div id="dialogue-name-tag"></div>
      </div>
    </div>
    <div id="dialogue-input-wrap">
      <input id="dialogue-input" type="text" placeholder="Type your message..." autocomplete="off" />
      <button id="dialogue-send">Send</button>
      <button id="dialogue-close">✕</button>
    </div>
    <div id="dialogue-history"></div>
  </div>

  
  <!-- ── Report panel (for long agent outputs) ──── -->
  <div id="report-overlay" class="hidden">
    <div id="report-panel">
      <div id="report-header">
        <div id="report-agent-info">
          <span id="report-emoji"></span>
          <span id="report-agent-name"></span>
          <span id="report-timestamp"></span>
        </div>
        <button id="report-close">✕ Close</button>
      </div>
      <div id="report-body"></div>
    </div>
  </div>

  <!-- ── Notification toast ───────────────────── -->
  <div id="toast-container"></div>

  <script src="js/lab.js"></script>
</body>
</html>
